<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Padel Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="nav-placeholder"></div>

  <main class="container">
    <section class="card">
      <div class="card-header">
        <h2>🏆 Leaderboard</h2>
        <div class="year-filter" id="leaderboard-filter">
          <button class="filter-btn" data-year="current">Current</button>
          <button class="filter-btn active" data-year="2026">2026</button>
          <button class="filter-btn" data-year="2025">2025</button>
          <button class="filter-btn" data-year="2024">2024</button>
          <button class="filter-btn" data-year="all">All‑time</button>
        </div>
      </div>
      <div id="leaderboard"><p class="empty">Loading...</p></div>
    </section>

    <button class="btn btn-primary btn-lg" id="log-match-btn">+ Log a Match</button>

    <section class="card">
      <div class="card-header">
        <h2>📋 Recent Matches</h2>
        <div class="year-filter" id="history-filter">
          <button class="filter-btn active" data-year="2026">2026</button>
          <button class="filter-btn" data-year="2025">2025</button>
          <button class="filter-btn" data-year="2024">2024</button>
          <button class="filter-btn" data-year="all">All‑time</button>
        </div>
      </div>
      <div id="match-history"><p class="empty">Loading...</p></div>
    </section>
  </main>

  <!-- Log Match Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2>Log a Match</h2>
        <button class="modal-close" id="modal-close">×</button>
      </div>
      <form id="match-form">
        <p class="picker-hint" id="picker-hint">Tap 2 players for <strong>Team 1</strong></p>
        <div class="player-picker" id="player-picker"></div>

        <div class="teams-vs-row">
          <div class="team-vs-pill" id="t1-pill">—</div>
          <span class="vs-text">vs</span>
          <div class="team-vs-pill" id="t2-pill">—</div>
        </div>

        <div class="score-block">
          <div class="score-row">
            <span class="score-name t1-color" id="score-t1-name">T1</span>
            <input type="number" id="s1t1" min="0" max="99" placeholder="0" required>
            <span class="score-dash">–</span>
            <input type="number" id="s1t2" min="0" max="99" placeholder="0" required>
            <span class="score-name t2-color" id="score-t2-name">T2</span>
          </div>
        </div>

        <details class="df-section">
          <summary>⚡ Double Faults <small>(optional)</small></summary>
          <div class="df-grid">
            <div class="df-item"><label id="df-label-t1p1">P1</label><input type="number" id="df-t1p1" min="0" value="0"></div>
            <div class="df-item"><label id="df-label-t1p2">P2</label><input type="number" id="df-t1p2" min="0" value="0"></div>
            <div class="df-item"><label id="df-label-t2p1">P3</label><input type="number" id="df-t2p1" min="0" value="0"></div>
            <div class="df-item"><label id="df-label-t2p2">P4</label><input type="number" id="df-t2p2" min="0" value="0"></div>
          </div>
        </details>

        <p id="match-error" class="error-msg hidden"></p>
        <button type="submit" class="btn btn-primary btn-full" id="save-match-btn" disabled>Save Match</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
